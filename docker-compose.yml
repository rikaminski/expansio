services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${DOCKER_API_PORT:-4003}:4000"
    environment:
      - API_PORT=4000
      - CORS_ORIGINS=http://localhost:${DOCKER_WEB_PORT:-3003},http://localhost:3000,http://localhost:5173
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${DOCKER_WEB_PORT:-3003}:3000"
    environment:
      - WEB_PORT=3000
      - API_PORT=4000
      - API_URL=http://api:4000
    depends_on:
      - api
    restart: unless-stopped
