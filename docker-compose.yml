services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${DOCKER_API_PORT:-4003}:4000"
    environment:
      - API_PORT=4000
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${DOCKER_WEB_PORT:-3003}:3000"
    environment:
      - WEB_PORT=3000
      - VITE_API_URL=http://localhost:${DOCKER_API_PORT:-4003}
    depends_on:
      - api
    restart: unless-stopped
