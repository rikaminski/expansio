services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "${DOCKER_API_PORT:-4003}:${DOCKER_API_PORT:-4003}"
    environment:
      - API_PORT=${DOCKER_API_PORT:-4003}
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./apps/api/src
          target: /app/apps/api/src
        - action: sync
          path: ./packages/shared
          target: /app/packages/shared
        - action: rebuild
          path: ./apps/api/package.json

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "${DOCKER_WEB_PORT:-3003}:${DOCKER_WEB_PORT:-3003}"
    environment:
      - WEB_PORT=${DOCKER_WEB_PORT:-3003}
      - VITE_API_URL=http://localhost:${DOCKER_API_PORT:-4003}
    depends_on:
      - api
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: ./apps/web/src
          target: /app/apps/web/src
        - action: sync
          path: ./packages/shared
          target: /app/packages/shared
        - action: rebuild
          path: ./apps/web/package.json
